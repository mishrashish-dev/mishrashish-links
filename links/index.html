<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ashish Mishra | Links</title>
    <meta
      name="description"
      content="Official links hub for Ashish Mishra. Explore projects, portfolio, socials, and more from one place."
    />
    <meta name="theme-color" content="#121212" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:FILL@1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="linktree-shell">
        <header class="top-actions" aria-label="Page actions">
          <button
            class="top-icon theme-toggle"
            type="button"
            aria-label="Toggle dark mode"
            aria-pressed="false"
          >
            <span class="material-symbols-rounded icon-mark theme-icon">light_mode</span>
          </button>
          <button class="top-icon share-button" type="button" aria-label="Share this page">
            <span class="material-symbols-rounded icon-mark">ios_share</span>
          </button>
        </header>

        <section class="profile-block">
          <div class="avatar-ring">
            <div class="avatar-mask">
              <img
                class="avatar"
                src="../Assets/mishrAshish-vlog.png"
                alt="Profile picture of Ashish Mishra"
              />
            </div>
          </div>
          <h1>@mishrashish.vlog</h1>
          <p class="profile-role">Artist &amp; Designer</p>
        </section>

        <section class="links-grid" aria-label="Important links">
          <a
            class="link-card"
            href="https://www.instagram.com/mishrashishart/"
            target="_blank"
            rel="noreferrer"
          >
            <span class="link-icon">MA</span>
            <span class="link-label">mishrashish.art</span>
            <span class="link-menu" aria-hidden="true">&vellip;</span>
          </a>
          <a
            class="link-card"
            href="https://www.instagram.com/mishrashishdesign/"
            target="_blank"
            rel="noreferrer"
          >
            <span class="link-icon">MD</span>
            <span class="link-label">mishrashish.design</span>
            <span class="link-menu" aria-hidden="true">&vellip;</span>
          </a>
          <a
            class="link-card"
            href="https://dev.mishrashish.com"
            target="_blank"
            rel="noreferrer"
          >
            <span class="link-icon">DM</span>
            <span class="link-label">dev.mishrashish.com</span>
            <span class="link-menu" aria-hidden="true">&vellip;</span>
          </a>
          <a
            class="link-card"
            href="https://www.skillshare.com/en/user/mishrashishacademy"
            target="_blank"
            rel="noreferrer"
          >
            <span class="link-icon">MA</span>
            <span class="link-label">mishrashish.academy</span>
            <span class="link-menu" aria-hidden="true">&vellip;</span>
          </a>
        </section>

        <footer class="profile-footer">
          <p class="profile-footer-text">
            <strong class="profile-footer-brand">mishrashish.com</strong> &copy; 2026
          </p>
          <p class="profile-footer-credit">
            <span class="profile-footer-neutral">Made with</span>
            <span class="material-symbols-rounded profile-footer-heart" aria-hidden="true">favorite</span>
            <span class="profile-footer-neutral">by</span>
            <a
              href="https://dev.mishrashish.com"
              class="profile-footer-dev"
              target="_blank"
              rel="noopener"
              >dev.mishrashish.com</a
            >
          </p>
        </footer>

      </section>
    </main>
    <script src="../assets/script.js"></script>
  </body>
</html>
